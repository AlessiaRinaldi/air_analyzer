project:
  type: website
  output-dir: docs
  render:
    - index.qmd
    - overview.qmd
    - hardware.qmd
    - firmware.qmd
    - usage.qmd

website:
  title: "Air Analyzer"
  page-navigation: true

  sidebar:
    style: "docked"
    search: true
    contents:
      - text: "Home"
        href: index.qmd

      - section: "Project Overview"
        contents:
          - href: overview.qmd
