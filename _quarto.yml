      - section: "Hardware"
        contents:
          - href: hardware.qmd
            text: "Hardware"

      - section: "Firmware"
        contents:
          - href: firmware.qmd
            text: "Firmware"

      - section: "Usage"
        contents:
          - href: usage.qmd
            text: "Usage"

format:
  html:
    theme:
      - cosmo
      - styles.scss
    toc: true
    toc-depth: 3
    number-sections: false
    code-fold: true
    code-copy: true